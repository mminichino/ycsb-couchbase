appender.0.type = Console
appender.0.name = CONSOLE
appender.0.layout.type = PatternLayout
appender.0.layout.pattern = [%highlight{%level}{FATAL=red blink, ERROR=red, WARN=yellow bold, INFO=green, DEBUG=green bold, TRACE=blue}] %msg%n%ex

appender.1.type = File
appender.1.name = FILE
appender.1.fileName = ycsb.log
appender.1.append = false
appender.1.layout.type = PatternLayout
appender.1.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n%ex

rootLogger.level = INFO
rootLogger.appenderRef.0.ref = CONSOLE
rootLogger.appenderRef.0.level = INFO
rootLogger.appenderRef.1.ref = FILE
rootLogger.appenderRef.1.level = ERROR

# Loggers
logger.couchbase.name = com.couchbase
logger.couchbase.level = ERROR
logger.couchbase.additivity = false
#
logger.netty.name = io.netty
logger.netty.level = ERROR
logger.netty.additivity = false
#
logger.rest.name = com.codelry.util.rest
logger.rest.level = ERROR
logger.rest.additivity = false
#
logger.dockerjava.name = com.github.dockerjava
logger.dockerjava.level = ERROR
logger.dockerjava.additivity = false
#
logger.testcontainers.name = org.testcontainers
logger.testcontainers.level = ERROR
logger.testcontainers.additivity = false
